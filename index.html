<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title is set from strings.js by main.js on load -->
  <title>Minhocário</title>
  <!-- Cascade order is load order, and this list is its source of truth.
       tokens -> font -> base -> components -> screens -> motion. motion.css must
       stay last: its prefers-reduced-motion block is a blanket `*` override that
       only wins from here. tokens.css and font.css select nothing, so they sit
       first harmlessly and let the face resolve before the rules that use it.
       Six <link>s, never @import (which serialises round trips). -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/motion.css">
</head>
<body>

       Inlined rather than fetched: zero HTTP requests, cached with the HTML, and
       it keeps the "no external network calls, works offline" non-negotiable
       trivially true. `js/ui/icons.js` is the only module that builds <use>
       references at runtime; the static chrome below writes them by hand.

       NOT `display: none` — that stops <use> resolving in some engines. It is
       taken out of layout by `.ico-sprite` in css/components.css instead.

       Every symbol paints in `currentColor`, so an icon inherits the two-tier
       warn/alert colouring of whatever it sits inside for free.

       THE FOOD SET (14, in catalog order) IS UNDER A UNIFORM-TREATMENT
       DISCIPLINE — see DESIGN.md. Identical circular frame, identical viewBox,
       one stroke weight, stroke-only, `currentColor` only. The frame is what the
       eye groups on, so it must stay byte-identical across all 14: the moment
       one icon reads as a different KIND of thing, the list has leaked the
       suitability split it exists to hide. `tests/icons.test.js` enforces every
       part of that which a machine can see; the clustering of the glyphs THEMSELVES
       is a manual review item (CPV2) that no test here can reach. -->

  <!-- Developer navigation: jumps between screens without playing through the
       flow. Hidden by default and removed from the DOM for players; main.js
       reveals it only under `?dev=1`. Text filled from strings.js by main.js. -->
  <nav id="dev-nav" class="dev-nav" aria-label="dev" hidden>
    <span class="dev-nav__label" data-string="devNav.label"></span>
    <button type="button" data-nav="home" data-string="devNav.home"></button>
    <button type="button" data-nav="shop" data-string="devNav.shop"></button>
    <button type="button" data-nav="setup" data-string="devNav.setup"></button>
    <button type="button" data-nav="game" data-string="devNav.game"></button>
    <!-- Frame-time readout (V19). The instrument the shadow perf-gate is measured
         with; carries no user-facing string, so it is exempt from the i18n
         catalog like the other dev-only scaffolding. Filled each frame by main.js. -->
    <span id="dev-perf" class="dev-nav__perf" aria-hidden="true"></span>
  </nav>

  <main id="app">
    <!-- HOME -->
    <section id="screen-home" class="screen" data-screen="home" hidden>
      <div class="home">
        <!-- Language selector (I2 / spec C-0002). Native-name buttons are built
             by js/ui/home.js from LANG_NAMES; selecting one switches the whole
             UI immediately, persists to the minhocario.lang key, and rebuilds the
             ranking + nickname. Home-only: language is fixed once a farm runs. -->
        <div class="lang-select" role="group" aria-labelledby="lang-select-label">
          <span id="lang-select-label" class="lang-select__label" data-string="home.languageLabel"></span>
          <div class="lang-select__options" id="lang-options"></div>
        </div>
        <h1 class="home__title" data-string="home.title"></h1>
        <p class="home__subtitle" data-string="home.subtitle"></p>
        <!-- No ":" text node between label and value. In a flex row a bare text
             node becomes its own flex item, so the colon floated between two
             gaps ("Apelido : Nome"); the layout separates them instead. -->
        <p class="home__nickname">
          <span data-string="home.nicknameLabel"></span>
          <strong id="home-nickname">—</strong>
          <button type="button" id="btn-reroll" data-string="home.reroll"></button>
        </p>
        <p id="home-notice" class="home__notice" role="alert" hidden></p>
        <div class="home__actions">
          <button type="button" id="btn-play" data-string="home.play"></button>
          <button type="button" id="btn-continue" data-string="home.continue" hidden></button>
        </div>
        <section class="ranking">
          <h2 data-string="home.rankingTitle"></h2>
          <table class="ranking__table">
            <thead>
              <tr>
                <th data-string="home.rankingHeaderNick"></th>
                <th class="ranking__num" data-string="home.rankingHeaderScore"></th>
                <th class="ranking__num" data-string="home.rankingHeaderDays"></th>
              </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
          </table>
          <p id="ranking-empty" class="ranking__empty" data-string="home.rankingEmpty"></p>
        </section>
      </div>
    </section>

    <!-- SHOP -->
    <section id="screen-shop" class="screen" data-screen="shop" hidden>
      <header class="screen__header">
        <h1 data-string="shop.title"></h1>
        <!-- Swapped to the upgrade copy by initShop when reached mid-farm. -->
        <p id="shop-subtitle" data-string="shop.subtitle"></p>
        <p class="wallet"><span data-string="shop.walletLabel"></span><span id="shop-wallet">—</span></p>
      </header>
      <div id="shop-list" class="shop__list"></div>
      <button type="button" class="screen__back" data-nav="home" data-string="shop.back"></button>
    </section>

    <!-- SETUP -->
    <section id="screen-setup" class="screen" data-screen="setup" hidden>
      <header class="screen__header">
        <h1 data-string="setup.title"></h1>
        <p data-string="setup.subtitle"></p>
      </header>
      <form id="setup-form" class="setup">
        <fieldset>
          <legend data-string="setup.speciesLabel"></legend>
          <div id="setup-species"></div>
        </fieldset>
        <fieldset>
          <legend data-string="setup.beddingLabel"></legend>
          <div id="setup-bedding"></div>
        </fieldset>
        <fieldset>
          <legend data-string="setup.firstWasteLabel"></legend>
          <div id="setup-waste"></div>
        </fieldset>
        <fieldset>
          <legend data-string="setup.placementLabel"></legend>
          <input type="range" id="setup-placement" min="0" max="1" step="0.01" value="0.5">
        </fieldset>
        <button type="submit" id="setup-confirm" data-string="setup.confirm"></button>
      </form>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen screen--game" data-screen="game" hidden>
      <!-- An instrument strip, not a row of chips: one glyph, one tracked
           micro-label and one tabular value per readout, divided by hairlines.
           The ":" text nodes are gone — a bare text node in a flex row becomes
           its own flex item, so each colon floated between two gaps.

           Every value written by updateHud carries `.hud__value`, which is what
           gives it tabular numerals; tests/markup.test.js derives that list from
           hud.js itself, so a seventh readout cannot be added without one.

           Icons are SIBLINGS of the [data-string] spans (see the note on the
           actions panel below) — applyStrings() would otherwise wipe them on
           every language switch. -->
      <header class="hud" id="hud">
        <!-- Player identity: no `data-string` — the nickname is player data, not
             translatable copy (it stays pt-BR-flavored in every locale). -->
        <span class="hud__item hud__item--player">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-player"/></svg>
          <span class="hud__value" id="hud-nickname">—</span>
        </span>
        <span class="hud__item">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-score"/></svg>
          <span class="hud__label" data-string="game.hudScore"></span>
          <span class="hud__value" id="hud-score">0</span>
        </span>
        <span class="hud__item">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-money"/></svg>
          <span class="hud__label" data-string="game.hudMoney"></span>
          <span class="hud__value" id="hud-money">0</span>
        </span>
        <span class="hud__item">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-day"/></svg>
          <span class="hud__label" data-string="game.hudDay"></span>
          <span class="hud__value" id="hud-day">1</span>
        </span>
        <span class="hud__item">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-time"/></svg>
          <span class="hud__label" data-string="game.hudTime"></span>
          <span class="hud__value" id="hud-time">00h</span>
        </span>
        <span class="hud__item">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-status"/></svg>
          <span class="hud__label" data-string="game.hudStatus"></span>
          <span class="hud__value" id="hud-status" data-string="game.statusOk"></span>
        </span>
      </header>

      <!-- Internals panel: the numeric gauge layer, ALWAYS present. It is the
           instrument the player reads the farm with, so it is deliberately not
           gated behind the x-ray toggle (which now only affects the 3D bin) —
           collapsing it is the player's choice, via the <details> disclosure.
           Populated by js/ui/actions.js on every tick while open.

           V12 promoted it out of the .stage overlay into its own grid column:
           it is the densest content on screen and it was in the most
           constrained container. The bin can no longer slide underneath it, so
           the dodge machinery that used to flip the panel side to side was
           deleted outright rather than left inert.

           It must stay a <details>: both this panel and #stats early-return on
           `if (!panel.open) return`, and `open` is undefined on every other
           element, so a <div> here renders blank forever with no error.
           tests/markup.test.js holds both facts. -->
      <details class="internals" id="internals" open>
        <summary data-string="game.internalsTitle"></summary>
        <div id="internals-body"></div>
      </details>

      <div class="stage" id="stage">
        <!-- Three.js canvas mounts here (T16+) -->
        <canvas id="scene-canvas"></canvas>

        <!-- Colony-dead banner (§2.1): production has stopped and the only way
             forward is to repopulate. Shown/hidden by js/ui/actions.js. -->
        <div class="banner" id="colony-dead" hidden>
          <strong data-string="game.colonyDeadTitle"></strong>
          <p data-string="game.colonyDeadBody"></p>
          <button type="button" data-action="repopulate">
            <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-worms"/></svg>
            <span data-string="game.repopulate"></span>
          </button>
        </div>
      </div>

      <!-- Every icon is a SIBLING of the [data-string] span, never a child of it.
           js/main.js `applyStrings()` does `el.textContent = t(key)` on every
           [data-string] node, so an <svg> nested inside one is wiped at init AND
           on every language switch. tests/markup.test.js is the permanent
           tripwire for that; the icons themselves carry no text, so the three
           locales are untouched by this restructure and every key is unchanged. -->
      <aside class="actions" id="actions">
        <h2 data-string="game.actionsTitle"></h2>
        <button type="button" data-action="addWaste">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-addWaste"/></svg>
          <span data-string="game.addWaste"></span>
        </button>
        <button type="button" data-action="addSawdust">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-addSawdust"/></svg>
          <span data-string="game.addSawdust"></span>
        </button>
        <button type="button" data-action="addWorms">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-worms"/></svg>
          <span data-string="game.addWorms"></span>
        </button>
        <button type="button" data-action="drain">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-drain"/></svg>
          <span data-string="game.drain"></span>
        </button>
        <button type="button" data-action="harvest">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-harvest"/></svg>
          <span data-string="game.harvest"></span>
        </button>
        <button type="button" data-action="openShop" data-nav="shop">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-shop"/></svg>
          <span data-string="game.openShop"></span>
        </button>
        <button type="button" data-action="xray" aria-pressed="false">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-xray"/></svg>
          <span data-string="game.xrayToggle"></span>
        </button>
        <button type="button" data-action="restart">
          <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-restart"/></svg>
          <span data-string="game.restart"></span>
        </button>
        <label class="actions__slider">
          <span class="actions__slider-head">
            <svg class="ico" aria-hidden="true" focusable="false"><use href="#ico-move"/></svg>
            <span data-string="game.move"></span>
          </span>
          <input type="range" id="wall-position" min="0" max="1" step="0.01" value="0.5">
        </label>
        <p class="actions__feedback" id="action-feedback"></p>

        <!-- Score-detail / statistics box: the score and what drives it (§2.10's
             frozen formula is otherwise invisible behind a single HUD number).
             Deliberately in this sidebar column rather than as a .stage overlay —
             a second absolutely-positioned panel would fight the x-ray internals
             panel for the right-hand edge. Populated by js/ui/stats.js on every
             tick and every action; collapsible, open by default. -->
        <details class="stats" id="stats" open>
          <summary data-string="game.statsTitle"></summary>
          <div id="stats-body"></div>
        </details>
      </aside>

      <!-- Modal chooser reused by the add-waste / portion / worm-pack prompts.
           Contents are built per prompt by js/ui/actions.js. -->
      <dialog class="chooser" id="chooser"></dialog>

      <footer class="speed" id="speed">
        <span data-string="game.speedLabel"></span>
        <div class="speed__buttons">
          <button type="button" data-speed="0" data-string="game.speedPause"></button>
          <button type="button" data-speed="0.25">0.25×</button>
          <button type="button" data-speed="0.5">0.5×</button>
          <button type="button" data-speed="1" class="is-active">1×</button>
          <button type="button" data-speed="5">5×</button>
          <button type="button" data-speed="20">20×</button>
        </div>
        <span class="speed__paused" id="speed-paused" data-string="game.speedPaused" hidden></span>
      </footer>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
